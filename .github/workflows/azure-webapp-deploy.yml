name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: GATHER-Nexus-New-Refreshment-Site
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Sync homepage to index.html
        run: npm run sync

      - name: Run tests
        run: npm test

      - name: Build deploy package with node_modules
        shell: pwsh
        run: |
          foreach ($cmdFile in @('start-azure.cmd', 'run.cmd', 'deploy.cmd')) {
            if (Test-Path $cmdFile) {
              $text = [IO.File]::ReadAllText($cmdFile).Replace("`n", "`r`n").Replace("`r`r`n", "`r`n")
              [IO.File]::WriteAllText($cmdFile, $text)
            }
          }
          if (Test-Path deploy_pkg) { Remove-Item deploy_pkg -Recurse -Force }
          New-Item -ItemType Directory -Path deploy_pkg | Out-Null
          robocopy . deploy_pkg /E /XD .git deploy_pkg /XF deploy.zip | Out-Null
          $robocopyExit = $LASTEXITCODE
          # Robocopy uses 0-7 for success; GitHub Actions fails the step on any non-zero exit.
          if ($robocopyExit -ge 8) { throw "robocopy failed with exit code $robocopyExit" }
          if (!(Test-Path deploy_pkg/node_modules/express/package.json)) {
            throw "express is missing from deploy_pkg/node_modules"
          }
          Write-Host "Deploy package ready (robocopy exit $robocopyExit)."
          exit 0

      - name: Configure Azure Node.js runtime
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: node scripts/configure-azure-settings.mjs

      - name: Patch web.config with Azure Node path
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: node scripts/patch-azure-webconfig.mjs

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy_pkg

      - name: Verify live site health
        shell: pwsh
        continue-on-error: true
        run: |
          $healthUrl = 'https://gather-nexus-new-refreshment-site-gea5ddfae7gwhtbv.uksouth-01.azurewebsites.net/api/health'
          foreach ($attempt in 1..4) {
            try {
              $health = Invoke-WebRequest -Uri $healthUrl -UseBasicParsing -TimeoutSec 30
              if ($health.StatusCode -eq 200) {
                Write-Host $health.Content
                Write-Host "Azure health OK on attempt $attempt."
                exit 0
              }
            } catch {
              Write-Host "Attempt $attempt: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }
          Write-Host "Azure health check failed. Use Share-Client-Now.bat for an immediate client link."
          exit 0
