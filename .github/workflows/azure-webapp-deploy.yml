name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: GATHER-Nexus-New-Refreshment-Site
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Sync homepage to index.html
        run: npm run sync

      - name: Run tests
        run: npm test

      - name: Verify production dependencies
        run: |
          node -e "require('express'); console.log('express ok')"
          if (!(Test-Path node_modules\express\package.json)) { throw 'express missing from node_modules' }

      - name: Prepare deployment package
        run: |
          if (Test-Path deploy_pkg) { Remove-Item deploy_pkg -Recurse -Force }
          New-Item -ItemType Directory -Path deploy_pkg | Out-Null
          robocopy . deploy_pkg /E /XD .git deploy_pkg /XF deploy.zip
          if ($LASTEXITCODE -ge 8) { exit 1 }
          if (!(Test-Path deploy_pkg\node_modules\express\package.json)) { throw 'express not copied to deploy_pkg' }

      - name: Configure Azure Node.js runtime
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: node scripts/configure-azure-settings.mjs

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy_pkg
