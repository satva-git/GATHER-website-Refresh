<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1440,initial-scale=1.0"/>
<title>Subpage nav — module pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>

/* ============================================================
   TOKENS
============================================================ */
:root{
  --ink:           #0a1b30;
  --ink-2:         #0f2340;
  --ink-3:         #1a2f4f;
  --paper:         #ffffff;
  --paper-2:       #f6f8fb;
  --paper-3:       #eef2f7;
  --teal:          #2d7261;
  --teal-2:        #3a8572;
  --teal-deep:     #245a4e;
  --teal-tint:     #e9f2ef;
  --teal-line:     #c5ddd6;
  --teal-rgb:      45, 114, 97;

  --text:          #0a1b30;
  --text-mid:      #4a5b70;
  --text-muted:    #7787a0;
  --text-light:    #c5d1e0;
  --text-ghost:    rgba(255,255,255,.55);

  --line:          #e2e8f0;
  --line-2:        #d8e0eb;
  --line-dark:     rgba(255,255,255,.10);

  --font:          'Instrument Sans', ui-sans-serif, system-ui, sans-serif;

  --r-sm:          6px;
  --r-md:          10px;
  --r-lg:          16px;
  --r-pill:        100px;

  --ease:          cubic-bezier(.4,0,.2,1);

  --nav-gutter:    clamp(20px, 4.5vw, 80px);
  --nav-gap:       clamp(16px, 2.5vw, 40px);
  --nav-link-gap:  clamp(10px, 1.4vw, 24px);
}

/* ============================================================
   RESET
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font);
  background:var(--paper);
  color:var(--text);
  line-height:1.5;
  font-size:15px;
  overflow-x:hidden;
}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
ul{list-style:none}

/* ============================================================
   LAYOUT
============================================================ */
.wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.section{padding:96px 0}
.bg-paper{background:var(--paper)}
.bg-paper-2{background:var(--paper-2)}
.bg-ink{background:var(--ink);color:var(--text-light)}

/* ============================================================
   REVEAL
============================================================ */
.sr{opacity:0;transform:translateY(16px);transition:opacity .5s var(--ease),transform .5s var(--ease)}
.sr.in{opacity:1;transform:none}
.sr-d1{transition-delay:.06s}.sr-d2{transition-delay:.12s}.sr-d3{transition-delay:.18s}

/* ============================================================
   TYPE
============================================================ */
.eyebrow{
  display:inline-flex;align-items:center;gap:9px;
  font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--teal-deep);
}
.eyebrow::before{content:'';width:6px;height:6px;background:var(--teal);border-radius:50%;flex-shrink:0}
.bg-ink .eyebrow{color:var(--teal)}

.h1{font-size:clamp(29px,4.08vw,51px);font-weight:700;line-height:1.22;letter-spacing:-.025em;color:var(--ink)}
.h2{font-size:clamp(36px,4.2vw,52px);font-weight:600;line-height:1.08;letter-spacing:-.022em;color:var(--ink)}
.h3{font-size:clamp(22px,2.2vw,28px);font-weight:600;line-height:1.2;letter-spacing:-.015em;color:var(--ink)}
.h4{font-size:18px;font-weight:600;line-height:1.3;letter-spacing:-.005em;color:var(--ink)}
.lead{font-size:18px;line-height:1.55;color:var(--text-mid);font-weight:400}
.body{font-size:15.5px;line-height:1.6;color:var(--text-mid)}
.small{font-size:13px;line-height:1.5;color:var(--text-muted)}

.bg-ink .h1,.bg-ink .h2,.bg-ink .h3,.bg-ink .h4{color:var(--paper)}
.bg-ink .lead,.bg-ink .body{color:var(--text-light)}
.bg-ink .small{color:var(--text-ghost)}

.accent{color:var(--teal-deep)}

/* ============================================================
   SECTION HEADER
============================================================ */
.sec-head{text-align:center;max-width:720px;margin:0 auto 56px}
.sec-head .eyebrow{justify-content:center;margin-bottom:16px}
.sec-head .h2{margin-bottom:14px}
.sec-head .lead{max-width:600px;margin:0 auto}

/* ============================================================
   BUTTONS
============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:9px;
  font-size:14.5px;font-weight:600;line-height:1;
  padding:14px 24px;border-radius:var(--r-pill);
  transition:all .2s var(--ease);
  white-space:nowrap;border:1.5px solid transparent;
}
.btn--primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn--primary:hover{background:var(--teal-deep);border-color:var(--teal-deep);transform:translateY(-2px);box-shadow:0 10px 24px rgba(var(--teal-rgb),.28)}
.btn--outline{background:transparent;color:var(--teal);border-color:var(--teal)}
.btn--outline:hover{background:rgba(var(--teal-rgb),.06);border-color:var(--teal-deep);color:var(--teal-deep);transform:translateY(-2px);box-shadow:0 8px 20px rgba(var(--teal-rgb),.12)}
.btn--ghost-light{background:transparent;color:#fff;border-color:rgba(255,255,255,.28)}
.btn--ghost-light:hover{border-color:#fff;background:rgba(255,255,255,.06);transform:translateY(-2px)}
.btn--white{background:#fff;color:var(--ink);border-color:#fff}
.btn--white:hover{background:#eef5f3;transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.18)}

.btn .a{width:14px;height:14px;transition:transform .2s var(--ease);flex-shrink:0}
.btn:hover .a{transform:translateX(3px)}

.lnk{display:inline-flex;align-items:center;gap:7px;font-size:14.5px;font-weight:600;color:var(--teal-deep);transition:gap .2s var(--ease)}
.lnk:hover{gap:11px}

/* ============================================================
   NAV
============================================================ */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:18px 0;transition:background .25s var(--ease),padding .25s var(--ease),box-shadow .25s var(--ease);
}
#nav.stuck{
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 1px 0 var(--line);
  padding:11px 0;
}
#nav-progress{
  position:absolute;left:0;bottom:0;height:2px;width:0;
  background:linear-gradient(90deg,var(--teal),var(--teal-deep));
  transition:width .15s linear;
}
.nav-inner{
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:var(--nav-gap);
  width:100%;
  padding-inline:var(--nav-gutter);
}
.nav-logo{
  display:flex;align-items:center;
  flex-shrink:0;justify-self:start;
  line-height:0;
}
.nav-logo img{
  display:block;
  height:38.4px;
  width:auto;
}
.nav-center{
  display:flex;justify-content:center;align-items:center;
  min-width:0;
}
.nav-links{
  list-style:none;margin:0;padding:0;
  display:flex;align-items:center;justify-content:center;
  flex-wrap:nowrap;gap:var(--nav-link-gap);
}
.nav-links > li{position:relative}
.nav-links a,
.nav-drop-trigger{
  font-size:clamp(13px,1.05vw,14.5px);font-weight:500;color:var(--ink);
  transition:color .15s;position:relative;padding:4px 0;
  font-family:inherit;line-height:1.2;
}
.nav-drop-trigger{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:none;cursor:pointer;
}
.nav-link--caps{letter-spacing:.02em;text-transform:uppercase;font-size:13.5px}
.nav-chevron{
  width:10px;height:10px;flex-shrink:0;
  color:var(--ink);opacity:.65;
  transition:transform .2s var(--ease);
}
.nav-item--drop.open .nav-chevron{transform:rotate(180deg)}
.nav-links a::after,
.nav-drop-trigger::after{
  content:'';position:absolute;left:0;right:0;bottom:-2px;height:2px;
  background:var(--teal);border-radius:2px;
  transform:scaleX(0);transform-origin:center;
  transition:transform .2s var(--ease);
}
.nav-drop-trigger::after{right:15px}
.nav-links a:hover,
.nav-drop-trigger:hover{color:var(--ink)}
.nav-links a:hover::after,
.nav-drop-trigger:hover::after{transform:scaleX(1)}
.nav-drop{
  position:absolute;top:calc(100% + 12px);left:50%;
  transform:translateX(-50%) translateY(6px);
  min-width:230px;list-style:none;margin:0;padding:8px;
  background:#fff;border:1px solid var(--line);
  border-radius:12px;box-shadow:0 14px 40px rgba(10,27,48,.12);
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .18s var(--ease),transform .18s var(--ease),visibility .18s;
  z-index:300;
}
.nav-item--drop.open .nav-drop,
.nav-item--drop:hover .nav-drop,
.nav-item--drop:focus-within .nav-drop{
  opacity:1;visibility:visible;pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}
.nav-drop a{
  display:block;padding:9px 12px;border-radius:8px;
  font-size:14px;font-weight:500;color:var(--text-mid);
  white-space:nowrap;
}
.nav-drop a::after{display:none}
.nav-drop a:hover{background:var(--paper-2);color:var(--ink)}
.nav-right{
  display:flex;align-items:center;gap:clamp(8px,1vw,12px);
  flex-shrink:0;justify-self:end;
}
.nav-login{font-size:14px;font-weight:500;color:var(--text-mid);padding:8px 4px;transition:color .15s}
.nav-login:hover{color:var(--ink)}
.nav-cta{
  font-size:13.5px;font-weight:600;background:var(--teal);color:#fff;
  padding:10px 20px;border-radius:var(--r-pill);transition:all .2s var(--ease);
}
.nav-cta:hover{background:var(--teal-deep);transform:translateY(-1px);box-shadow:0 8px 18px rgba(var(--teal-rgb),.28)}

/* ============================================================
   HERO
============================================================ */
.hero{
  padding:112px 0 64px;
  background:linear-gradient(180deg,var(--paper-2) 0%,var(--paper) 100%);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-220px;left:-120px;
  width:580px;height:580px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.10) 0%,transparent 65%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;bottom:-180px;right:-120px;
  width:440px;height:440px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.06) 0%,transparent 60%);
  pointer-events:none;
}
.hero-grid{
  display:grid;grid-template-columns:1fr 1.05fr;gap:64px;align-items:center;
  position:relative;z-index:2;
}
.hero-img-wrap{position:relative}
.hero-img-wrap img{
  max-width:100%;width:100%;
  filter:drop-shadow(0 32px 64px rgba(10,27,48,.20));
}
.hero-img-wrap .blob{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:95%;height:95%;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.14) 0%,transparent 60%);
  z-index:-1;
}

.hero-ai{
  display:inline-flex;align-items:center;gap:9px;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--teal-deep);background:var(--teal-tint);
  padding:7px 15px;border-radius:var(--r-pill);
  border:1px solid var(--teal-line);margin-bottom:22px;
}
.hero-ai::before{
  content:'';width:7px;height:7px;background:var(--teal);border-radius:50%;
  animation:blink 1.8s infinite;flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hero h1{margin-bottom:16px}
.hero h1 .hero-h1-line{display:block}
.hero h1 .accent{color:var(--teal-deep)}
.hero-sub{
  font-size:18px;font-weight:600;color:var(--ink);line-height:1.44;
  margin:0 0 20px;max-width:none;
}
.hero-partners{
  display:flex;align-items:flex-end;gap:0;
  list-style:none;margin:0 0 24px;padding:0;
}
.hero-partners .sprite-img{
  background-image:url(https://gather.nexus/wp-content/uploads/2026/03/gather-nexus-integrations-xero-quickbooks-client-logos.webp);
  background-repeat:no-repeat;flex-shrink:0;
}
.hero-partner-xero{width:115px;height:50px;background-position:-251px -102px}
.hero-partner-qb{
  width:218px;height:50px;background-position:-365px -100px;
  margin-left:25px;position:relative;
}
.hero-partner-qb::before,.hero-partner-intuit::before{
  content:'';position:absolute;left:-12px;top:5px;
  width:1px;height:40px;background:#ccc;
}
.hero-partner-intuit{
  width:63px;height:50px;background-position:-650px -100px;
  margin-left:25px;position:relative;
}

.hero-mods{display:flex;flex-direction:column;gap:7px;margin-bottom:24px}
.hero-mod{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--ink);font-weight:500}
.hero-mod::before{
  content:'';width:18px;height:18px;border-radius:50%;
  background:var(--teal-tint);border:1.5px solid var(--teal);
  flex-shrink:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l2.5 2.5L9 1' stroke='%232d7261' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:center;background-size:10px;
}

.hero-ctas{
  display:grid;grid-template-columns:auto auto;
  column-gap:12px;row-gap:8px;align-items:center;
  justify-content:start;margin-bottom:20px;width:fit-content;max-width:100%;
}
.hero-ctas .btn--primary{grid-column:1;grid-row:1}
.hero-ctas .btn--outline{grid-column:2;grid-row:1}
.hero-cta-note{grid-column:1;grid-row:2;margin:0;font-size:13px;font-weight:500;color:var(--ink);line-height:1.3}
.int-ctas{
  display:grid;grid-template-columns:auto;row-gap:8px;
  justify-items:start;margin-top:4px;
}
.hero-trust{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding-top:20px;border-top:1px solid var(--line)}
.hero-trust-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid)}
.hero-trust-item .ck{
  width:18px;height:18px;border-radius:50%;background:var(--teal-tint);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal);
}
.hero-trust-item strong{color:var(--ink);font-weight:700}

/* ============================================================
   FEATURED STRIP
============================================================ */
.featured{
  padding:44px 0;background:var(--paper);
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.featured-inner{
  display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:nowrap;
}
.featured-label{
  font-size:13px;font-weight:600;color:var(--text-muted);
  letter-spacing:-.01em;white-space:nowrap;
  display:flex;align-items:center;gap:10px;flex:0 0 auto;
}
.featured-label::after{content:'';width:24px;height:1px;background:var(--line-2);flex-shrink:0}
.featured-logos{
  display:flex;align-items:center;gap:18px;flex-wrap:nowrap;justify-content:center;
  flex:0 0 auto;
}
.featured-logos .featured-logo{
  height:64px;width:auto;max-width:none;display:block;object-fit:contain;flex:0 0 auto;
  transition:opacity .15s;
}
.featured-logos .featured-logo:hover{opacity:.85}
.pub{
  display:flex;align-items:center;gap:9px;
  color:var(--text-mid);font-size:15px;font-weight:600;
  transition:color .15s;letter-spacing:-.01em;filter:grayscale(.4);opacity:.8;
}
.pub:hover{color:var(--ink);filter:none;opacity:1}
.pub-mark{
  width:26px;height:26px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;letter-spacing:-.02em;
}
.pub-mark.xu{background:#d63a35}
.pub-mark.aw{background:#0a1b30}
.pub-mark.dd{background:#3b6cf0}
.pub-mark.at{background:#f5a623}

/* ============================================================
   STATS BAR
============================================================ */
.stats-bar{padding:40px 0;background:var(--paper-2);border-bottom:1px solid var(--line)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;align-items:center}
.stat{display:flex;align-items:center;gap:18px;padding:0 32px;position:relative}
.stat+.stat::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);height:52px;width:1px;background:var(--line-2)}
.stat-ic{
  width:48px;height:48px;flex-shrink:0;
  background:#fff;color:var(--teal-deep);
  display:flex;align-items:center;justify-content:center;border-radius:12px;
  border:1px solid var(--line);box-shadow:0 2px 6px rgba(10,27,48,.04);
}
.stat-text{flex:1;min-width:0}
.stat-text .n{font-size:20px;font-weight:700;color:var(--ink);letter-spacing:-.012em;line-height:1.15}
.stat-text .l{font-size:13px;color:var(--text-mid);line-height:1.4;margin-top:2px}

/* ============================================================
   PLATFORM WORKFLOW
============================================================ */
#platform,[id^="the-"],#three-pillars,#data-integrity,#platform-features,#intercompany-control,#group-reporting,#group-planning,#gather-difference,#modules{scroll-margin-top:88px}
#platform .wf-section + .wf-section{border-top:1px solid var(--line)}
.wf-section{padding:88px 0}
.wf-section--alt{background:var(--paper-2)}

.wf-grid{
  display:grid;grid-template-columns:minmax(280px,.92fr) minmax(0,1.08fr);
  gap:clamp(40px,5vw,72px);align-items:start;
}
.wf-content{max-width:520px}
.wf-pill{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--teal-deep);background:var(--teal-tint);border:1px solid var(--teal-line);
  border-radius:var(--r-pill);padding:7px 14px;margin-bottom:20px;
}
.wf-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0}
.wf-content .h2{
  font-size:clamp(27px,3.3vw,43px);
  line-height:1.12;
  margin-bottom:18px;
}
.wf-body{font-size:16px;line-height:1.65;color:var(--text-mid);margin-bottom:16px}
.wf-body strong{color:var(--ink);font-weight:600}
.wf-body:last-of-type{margin-bottom:24px}

.checks{display:flex;flex-direction:column;gap:11px;margin-bottom:0}
.checks li{display:flex;align-items:flex-start;gap:11px;font-size:14.5px;line-height:1.5;color:var(--ink)}
.check-ic{
  width:20px;height:20px;flex-shrink:0;margin-top:1px;
  background:var(--teal-tint);border:1px solid var(--teal-line);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:var(--teal);
}
.check-ic svg{width:10px;height:10px}

/* Workflow visualization panel */
.wf-vis{
  background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);
  padding:28px 24px 32px;position:relative;overflow:hidden;
  box-shadow:0 8px 32px rgba(10,27,48,.06);
}
.wf-vis::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:24px 24px;opacity:.35;
}
.wf-vis::after{
  content:'';position:absolute;top:0;right:0;width:120px;height:120px;
  border-bottom-left-radius:100%;
  background:radial-gradient(circle at 100% 0%,rgba(var(--teal-rgb),.06) 0%,transparent 70%);
  pointer-events:none;
}
.wf-vis-head{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--line);
}
.wf-vis-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
.wf-vis-caption{font-size:12px;color:var(--text-muted);text-align:right;max-width:200px;line-height:1.4}
.wf-vis-inner{position:relative;z-index:1}

/* Workflow cards */
.wf-flow{display:flex;align-items:stretch;gap:0}
.wf-flow--wrap{flex-wrap:wrap;justify-content:center}
.wf-arrow{
  display:flex;align-items:center;justify-content:center;
  width:28px;flex-shrink:0;color:var(--teal-deep);font-size:18px;font-weight:700;
  padding-top:48px;
}
.wf-card{
  flex:1;min-width:0;min-height:100%;
  background:#fff;border:1px solid var(--line);border-radius:var(--r-md);
  padding:16px 14px;display:flex;flex-direction:column;gap:10px;
  box-shadow:0 2px 8px rgba(10,27,48,.04);
}
.wf-card-ic{
  width:100%;aspect-ratio:4/3;max-height:88px;
  background:var(--teal-tint);border:1px dashed var(--teal-line);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;color:var(--teal);
}
.wf-card-ic svg{width:36px;height:36px;opacity:.85}
.wf-card-t{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.35;text-align:center}
.wf-card-s{font-size:11px;color:var(--text-muted);line-height:1.4;text-align:center;margin-top:auto}

/* Detailed module workflow cards */
.wf-mod-flow{display:flex;align-items:stretch;gap:0}
.wf-mod-card{
  flex:1;min-width:0;display:flex;flex-direction:column;
  background:#fff;border:1px solid var(--line);border-radius:var(--r-md);
  padding:18px 16px 20px;box-shadow:0 2px 10px rgba(10,27,48,.05);
}
.wf-mod-card .wf-card-ic{max-height:100px;margin-bottom:4px}
.wf-mod-card .wf-step-n{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--teal-deep);margin-bottom:4px;
}
.wf-mod-card .wf-step-h{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.25}
.wf-mod-card .wf-step-sub{font-size:12.5px;color:var(--text-mid);line-height:1.45;margin-bottom:12px;font-style:italic}
.wf-mod-card ul{display:flex;flex-direction:column;gap:6px;margin-top:auto}
.wf-mod-card ul li{
  font-size:11.5px;line-height:1.4;color:var(--text-mid);
  padding-left:12px;position:relative;
}
.wf-mod-card ul li::before{
  content:'';position:absolute;left:0;top:.55em;width:4px;height:4px;
  border-radius:50%;background:var(--teal);
}

/* Problem diagram */
.wf-problem-top{display:flex;align-items:stretch;gap:0;margin-bottom:0}
.wf-problem-down{
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0 16px;position:relative;z-index:1;
}
.wf-problem-down svg{color:var(--teal)}
.wf-problem-outcome{
  background:#fff;border:1px solid var(--line);border-radius:var(--r-md);
  padding:24px 20px;text-align:center;
  box-shadow:0 4px 16px rgba(10,27,48,.06);
}
.wf-problem-outcome h4{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:20px;line-height:1.35}
.wf-problem-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.wf-problem-col{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.wf-problem-col .wf-card-ic{max-height:56px;aspect-ratio:1;width:56px}
.wf-problem-col span{font-size:12px;font-weight:600;color:var(--ink);line-height:1.3}
.wf-problem-img{display:block;width:100%;height:auto;border-radius:var(--r-sm)}

/* Solution unified workflow */
.wf-solution-head{
  text-align:center;margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--line);position:relative;z-index:1;
}
.wf-solution-head span{font-size:13px;font-weight:600;color:var(--ink)}
.wf-solution-head::after{
  content:'→';position:absolute;right:0;top:50%;transform:translateY(-60%);
  color:var(--teal-deep);font-size:20px;font-weight:700;
}
.wf-solution-cards .wf-card{padding:14px 12px}
.wf-solution-cards .wf-card-t{font-size:11px;line-height:1.35}
.wf-module-groups{
  display:grid;grid-template-columns:2fr 2fr 1fr;gap:12px;
  margin-top:20px;padding-top:16px;position:relative;z-index:1;
}
.wf-module-group{display:flex;flex-direction:column;align-items:center;gap:8px}
.wf-module-bracket{
  width:100%;height:12px;border:1px solid var(--text-muted);border-top:none;
  border-radius:0 0 6px 6px;opacity:.5;
}
.wf-module-label{
  font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:#fff;background:var(--teal-deep);border-radius:var(--r-pill);
  padding:6px 12px;text-align:center;line-height:1.3;white-space:nowrap;
}

/* Planning horizontal steps */
.wf-plan-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.wf-plan-step{
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;
}
.wf-plan-step .wf-step-num{
  width:28px;height:28px;border-radius:50%;background:var(--teal-deep);color:#fff;
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
}
.wf-plan-step .wf-card-ic{max-height:72px;width:100%}
.wf-plan-step p{font-size:12px;font-weight:500;color:var(--ink);line-height:1.4}

.wf-plan-subhead{
  display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
  margin-bottom:20px;position:relative;z-index:1;
}
.wf-plan-subhead .wf-vis-title{margin:0}
.wf-plan-subhead .wf-vis-caption{max-width:280px}

/* The GATHER Difference */
.gather-diff{
  background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 55%,#163352 100%);
  border-radius:var(--r-lg);padding:52px 44px;margin-top:0;
  position:relative;overflow:hidden;
  box-shadow:0 16px 48px rgba(10,27,48,.18);
}
.gather-diff::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.25) 0%,transparent 68%);
  pointer-events:none;
}
.gather-diff-head{text-align:center;max-width:580px;margin:0 auto 36px;position:relative;z-index:1}
.gather-diff-head .wf-pill{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:var(--teal);margin-bottom:16px}
.gather-diff-head .h2{color:#fff;margin-bottom:12px;font-size:clamp(28px,3.4vw,40px)}
.gather-diff-head .lead{color:var(--text-light);margin:0 auto;font-size:16px;line-height:1.6}
.gather-diff-flow{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px 6px;
  margin-bottom:28px;padding:12px 20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r-pill);position:relative;z-index:1;
}
.gather-diff-flow span{
  font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:rgba(255,255,255,.75);white-space:nowrap;
}
.gather-diff-flow-arrow{color:var(--teal);font-size:14px;font-weight:700;opacity:.85}
.gather-diff-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:14px;position:relative;z-index:1;
}
.gather-diff-card{
  display:flex;align-items:flex-start;gap:16px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--r-md);padding:20px 22px;
  transition:background .2s var(--ease),border-color .2s var(--ease);
}
.gather-diff-card:hover{
  background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);
}
.gather-diff-card-body{flex:1;min-width:0}
.gather-diff-card h4{font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.35}
.gather-diff-card p{font-size:13.5px;line-height:1.55;color:rgba(197,209,224,.92);margin:0}
.gather-diff-card .diff-ic{
  width:40px;height:40px;border-radius:9px;flex-shrink:0;
  background:rgba(var(--teal-rgb),.18);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;color:var(--teal);
}
.gather-diff-card .diff-ic svg{width:20px;height:20px}

/* ============================================================
   INTEGRATIONS
============================================================ */
.int-grid{position:relative}
.int-track{
  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;
  transition:transform .45s var(--ease);
  will-change:transform;
}
.int-slide{min-width:0}
.int-carousel-dots{display:none}
.int-carousel-hint{display:none}
.int-card{
  background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);
  padding:52px 36px;display:flex;flex-direction:column;align-items:center;gap:24px;
  box-shadow:0 4px 32px rgba(10,27,48,.05);
  position:relative;overflow:hidden;
}
.int-card::before{
  content:'';position:absolute;top:-100px;right:-80px;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.08) 0%,transparent 65%);
  pointer-events:none;
}
.int-row{display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.int-box{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:13px 20px;font-size:14.5px;font-weight:600;color:var(--ink);
  display:flex;align-items:center;gap:9px;min-width:130px;justify-content:center;
  box-shadow:0 2px 8px rgba(10,27,48,.04);
}
.int-box.brand{background:var(--ink);color:#fff;border-color:var(--ink);padding:13px 22px}
.int-box.brand .mark{
  width:20px;height:20px;background:#fff;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
}
.int-box.brand .mark::before{content:'';width:8px;height:8px;background:var(--teal);border-radius:50%}
.int-box.brand span{color:var(--teal);font-weight:500}

.int-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:6px 0;position:relative;z-index:1}
.int-dots i{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:travel 1.4s infinite}
.int-dots i:nth-child(2){animation-delay:.25s}
.int-dots i:nth-child(3){animation-delay:.5s}
.int-dots i:nth-child(4){animation-delay:.75s}
.int-dots i:nth-child(5){animation-delay:1s}
@keyframes travel{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}

.int-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;margin-top:4px}
.int-tag{
  font-size:12px;font-weight:600;color:var(--teal-deep);
  background:var(--teal-tint);border:1px solid var(--teal-line);
  padding:5px 12px;border-radius:var(--r-pill);
}
.int-content{display:flex;flex-direction:column;justify-content:center;height:100%}
.int-content .h2{margin-bottom:16px}
.int-content .lead{margin-bottom:26px;max-width:460px}
.int-fine{font-size:13px;color:var(--text-muted);margin-top:12px}
.int-ctas .int-fine{margin-top:0}

/* ============================================================
   PRICING
============================================================ */
.pri-head{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;margin-bottom:48px;flex-wrap:wrap}
.pri-head-l{max-width:480px}
.pri-head-l .h2{margin-bottom:10px;margin-top:14px}
.pri-cta-row{display:flex;gap:10px;flex-wrap:wrap}

.pricing-table-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:#fff;border:1px solid var(--line);border-radius:var(--r-md);
  box-shadow:0 8px 28px rgba(10,27,48,.05);
}
.pricing-table{
  width:100%;min-width:880px;border-collapse:collapse;table-layout:fixed;
}
.pricing-table th,.pricing-table td{
  border:1px solid var(--line);padding:22px 20px;vertical-align:top;text-align:center;
}
.pricing-table th:first-child,.pricing-table td:first-child{text-align:left}
.pricing-table thead th{background:var(--paper-2)}
.pricing-table thead th:first-child{background:#fff;border-bottom:1px solid var(--line)}
.pt-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--teal-deep);
  background:var(--teal-tint);border:1px solid var(--teal-line);
  border-radius:var(--r-pill);padding:5px 12px 5px 10px;margin-bottom:14px;
}
.pt-badge svg{width:12px;height:12px;flex-shrink:0;color:var(--teal)}
.pt-audience{
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:8px;
}
.pt-groups{font-size:13px;line-height:1.45;color:var(--text-mid);max-width:180px;margin:0 auto}
.pt-module{
  font-size:15px;font-weight:600;line-height:1.45;color:var(--ink);max-width:280px;
}
.pt-desc{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.pt-bar{display:block;height:8px;border-radius:var(--r-pill);background:var(--paper-3);max-width:240px}
.pt-bar--sm{max-width:180px}
.pt-price{font-size:24px;font-weight:700;color:var(--ink);letter-spacing:-.022em;line-height:1.1}
.pricing-table tbody td{background:#fff}
.pricing-table tbody th{background:#fff;font-weight:600}
.pricing-table tfoot td{
  background:var(--paper-2);text-align:left;padding:24px 22px;
}
.pt-all{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:14px}
.pt-all-desc{display:flex;flex-direction:column;gap:8px}
.pt-all-desc .pt-bar{max-width:100%}

.pri-note{
  margin-top:32px;padding:14px 24px;
  font-size:13.5px;color:var(--text-mid);
  background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);
  display:inline-flex;align-items:center;gap:10px;
}
.pri-note-wrap{text-align:center}
.pri-note .ck{
  width:18px;height:18px;border-radius:50%;background:var(--teal-tint);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal-deep);font-weight:700;font-size:11px;
}

/* ============================================================
   CTA BANNER
============================================================ */
.cta{background:var(--ink);padding:104px 0;position:relative;overflow:hidden}
.cta::before{
  content:'';position:absolute;top:50%;right:-180px;transform:translateY(-50%);
  width:620px;height:620px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.16) 0%,transparent 60%);pointer-events:none;
}
.cta::after{
  content:'';position:absolute;top:50%;left:-160px;transform:translateY(-50%);
  width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(var(--teal-rgb),.06) 0%,transparent 60%);pointer-events:none;
}
.cta-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:56px;align-items:center;position:relative;z-index:1}
.cta-l .kpi{
  display:inline-flex;align-items:center;gap:9px;
  font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--teal);background:rgba(var(--teal-rgb),.12);
  padding:7px 16px;border-radius:var(--r-pill);border:1px solid rgba(var(--teal-rgb),.28);
  margin-bottom:24px;
}
.cta-l .kpi::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 4px rgba(var(--teal-rgb),.2);animation:blink 1.8s infinite}
.cta-l .h2{color:#fff;margin-bottom:18px;font-size:clamp(34px,4vw,52px)}
.cta-l .lead{color:var(--text-light);margin-bottom:32px;max-width:500px;font-size:18px}
.cta-l .btns{display:flex;gap:12px;flex-wrap:wrap}

.cta-r{position:relative}
.cta-mock{
  background:#fff;border-radius:var(--r-md);overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.36),0 0 0 1px rgba(255,255,255,.04);
  transform:rotate(-1.2deg);
}
.cta-mock:hover{transform:rotate(0deg);transition:transform .4s var(--ease)}
.cta-mock-bar{background:var(--paper-2);height:30px;display:flex;align-items:center;gap:6px;padding:0 12px;border-bottom:1px solid var(--line)}
.cta-mock-bar .bd{width:8px;height:8px}
.cta-mock-body{padding:0;display:flex;flex-direction:column}
.cta-tabs{
  display:flex;align-items:center;gap:0;padding:0 18px;
  border-bottom:1px solid var(--line);background:#fff;
}
.cta-tab{
  font-size:12.5px;font-weight:500;color:var(--text-mid);
  padding:14px 16px;border-bottom:2px solid transparent;margin-bottom:-1px;
}
.cta-tab.on{color:var(--teal-deep);font-weight:600;border-bottom-color:var(--teal)}
.cta-gtbl{display:flex;flex-direction:column}
.cta-gtbl-h,.cta-gtbl-r{
  display:grid;grid-template-columns:34px 1.1fr 1.35fr .85fr;gap:10px;
  align-items:start;padding:12px 18px;
}
.cta-gtbl-h{
  font-size:11px;font-weight:700;color:var(--text-muted);
  border-bottom:1px solid var(--line);background:var(--paper-2);
}
.cta-gtbl-r{
  font-size:12px;color:var(--ink);border-bottom:1px solid var(--line);line-height:1.45;
}
.cta-gtbl-r:last-child{border-bottom:none}
.cta-co{display:flex;flex-direction:column;gap:6px;min-width:0}
.cta-co-toggle{
  display:inline-flex;align-items:center;gap:6px;font:inherit;color:inherit;
  background:none;border:none;padding:0;cursor:default;text-align:left;
}
.cta-co-toggle svg{width:10px;height:10px;flex-shrink:0;color:var(--text-muted);transition:transform .2s var(--ease)}
.cta-gtbl-r:not(.exp) .cta-co-list{display:none}
.cta-co-list{display:flex;flex-direction:column;gap:4px;padding-left:2px}
.cta-co-list div{font-size:11.5px;color:var(--text-mid);line-height:1.4}
.cta-link{font-size:12px;font-weight:500;color:#2563eb;text-decoration:underline;text-underline-offset:2px}

/* ============================================================
   FAQ
============================================================ */
.faq-section{background:var(--paper);padding:96px 0}
.faq-wrap{max-width:880px;margin:0 auto}
.faq-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:36px;flex-wrap:wrap}
.faq-tab{
  font-size:14px;font-weight:500;
  padding:9px 18px;border-radius:var(--r-pill);
  background:#fff;border:1.5px solid var(--line);color:var(--text-mid);
  transition:all .15s var(--ease);
}
.faq-tab:hover:not(.active){border-color:var(--teal);color:var(--teal-deep);transform:translateY(-1px)}
.faq-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600;box-shadow:0 4px 12px rgba(10,27,48,.15)}

.faq-stack{display:flex;flex-direction:column;gap:10px}
.faq-item{
  border:1px solid var(--line);border-radius:var(--r-md);
  background:#fff;overflow:hidden;transition:border-color .15s,box-shadow .15s;
}
.faq-item.open{border-color:var(--teal);box-shadow:0 12px 28px rgba(var(--teal-rgb),.08)}
.faq-q{
  width:100%;text-align:left;padding:20px 24px;
  font-size:16px;font-weight:600;color:var(--ink);
  display:flex;align-items:center;justify-content:space-between;gap:18px;
  transition:background .15s;letter-spacing:-.005em;
}
.faq-q:hover{background:var(--paper-2)}
.faq-icon{
  width:32px;height:32px;flex-shrink:0;
  background:var(--teal-tint);color:var(--teal-deep);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  transition:transform .3s var(--ease),background .15s,color .15s;
}
.faq-item.open .faq-icon{transform:rotate(45deg);background:var(--teal);color:#fff}
.faq-icon svg{width:13px;height:13px}
.faq-a{
  max-height:0;overflow:hidden;padding:0 24px;
  font-size:14.5px;line-height:1.7;color:var(--text-mid);
  transition:max-height .35s ease,padding .25s ease;
}
.faq-item.open .faq-a{max-height:600px;padding:0 24px 22px}

.faq-help{
  text-align:center;margin-top:40px;padding:40px 36px 34px;
  background:#fff;border-radius:var(--r-lg);border:1px solid var(--line);
  box-shadow:0 10px 30px rgba(10,27,48,.04);
}
.faq-help-t{
  font-size:clamp(22px,2.4vw,28px);font-weight:700;color:var(--ink);
  margin-bottom:12px;letter-spacing:-.02em;line-height:1.25;max-width:720px;margin-inline:auto;
}
.faq-help-s{
  font-size:15px;line-height:1.6;color:var(--text-mid);
  margin-bottom:28px;max-width:680px;margin-inline:auto;
}
.faq-sub-form{max-width:760px;margin:0 auto;text-align:left}
.faq-sub-row{
  display:flex;align-items:stretch;gap:12px;margin-bottom:18px;
}
.faq-sub-field{
  flex:1;display:flex;align-items:center;gap:12px;
  background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-pill);
  padding:0 18px;min-height:52px;transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease);
}
.faq-sub-field:focus-within{
  background:#fff;border-color:var(--teal-line);box-shadow:0 0 0 4px rgba(var(--teal-rgb),.08);
}
.faq-sub-field svg{width:18px;height:18px;flex-shrink:0;color:var(--text-muted)}
.faq-sub-field input{
  flex:1;border:none;background:transparent;font:inherit;font-size:15px;color:var(--ink);
  outline:none;min-width:0;
}
.faq-sub-field input::placeholder{color:var(--text-muted)}
.faq-sub-btn{flex-shrink:0;padding:0 28px;min-height:52px;border-radius:var(--r-pill)}
